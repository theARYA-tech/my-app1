<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign Up</title>

<style>
:root {
    --bg: #f6f8fc;
    --glass: rgba(255,255,255,0.6);
    --text: #0f172a;
    --subtext: #64748b;
    --border: rgba(0,0,0,0.08);

    --primary: #6366f1;
    --primary2: #8b5cf6;
    --danger: #ef4444;
    --success: #10b981;

    --shadow: 0 20px 60px rgba(0,0,0,0.12);
}

.dark {
    --bg: #0a0f1c;
    --glass: rgba(17,24,39,0.6);
    --text: #e6edf3;
    --subtext: #9aa4b2;
    --border: rgba(255,255,255,0.06);

    --primary: #7c83ff;
    --primary2: #a78bfa;
    --danger: #f87171;

    --shadow: 0 25px 70px rgba(0,0,0,0.6);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Inter, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* TOGGLE */
.toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    cursor: pointer;
    font-size: 20px;
    user-select: none;
}

/* CARD */
.card {
    width: 100%;
    max-width: 400px;
    padding: 35px;
    border-radius: 20px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
}

/* INPUT */
.field {
    position: relative;
    margin-bottom: 18px;
}

.field input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    outline: none;
}

.field label {
    position: absolute;
    left: 12px;
    top: 14px;
    color: var(--subtext);
    transition: 0.2s;
    font-size: 13px;
    pointer-events: none;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label {
    top: -8px;
    font-size: 11px;
    background: var(--bg);
    padding: 0 5px;
}

/* PASSWORD */
.password-wrap {
    position: relative;
}

.eye {
    position: absolute;
    right: 12px;
    top: 14px;
    cursor: pointer;
    color: var(--subtext);
    user-select: none;
}

/* CHECKLIST */
.checklist {
    font-size: 12px;
    margin-top: 6px;
}

.checklist div {
    opacity: 0.5;
    transition: 0.2s;
}

.checklist .valid {
    color: var(--success);
    opacity: 1;
}

/* BUTTON */
button {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    color: white;
    font-weight: 600;
    background: linear-gradient(135deg, var(--primary), var(--primary2));
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

/* SPINNER */
.spinner {
    width: 16px;
    height: 16px;
    border: 2px solid white;
    border-top: 2px solid transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ERROR */
.error {
    color: var(--danger);
    font-size: 13px;
    margin-bottom: 10px;
    display: none;
}

/* SHAKE */
.shake {
    animation: shake 0.3s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}

/* OTP MODAL */
.otp-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    padding: 20px;
}

.otp-overlay.show {
    opacity: 1;
    pointer-events: all;
}

.otp-card {
    width: 100%;
    max-width: 360px;
    padding: 30px;
    border-radius: 20px;
    background: var(--glass);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    text-align: center;
}

.otp-inputs {
    display: flex;
    gap: 8px;
    margin: 20px 0;
    justify-content: center;
}

.otp-inputs input {
    width: 45px;
    height: 50px;
    text-align: center;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    outline: none;
}

/* RESEND */
.resend {
    cursor: pointer;
    opacity: 0.5;
    user-select: none;
    display: inline-block;
    margin-left: 6px;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleDark()">🌙</div>

<div class="card" id="card">
    <h2>Create Account</h2>

    <div class="error" id="errorBox"></div>

    <form id="form">
        <div class="field">
            <input id="username" name="username" placeholder=" " required autocomplete="username">
            <label for="username">Username</label>
        </div>

        <div class="field">
            <input id="email" name="email" type="email" placeholder=" " required autocomplete="email">
            <label for="email">Email</label>
        </div>

        <div class="field password-wrap">
            <input id="password" name="password" type="password" placeholder=" " required autocomplete="new-password">
            <label for="password">Password</label>
            <span class="eye" onclick="togglePassword()">👁</span>

            <div class="checklist">
                <div id="len">• 6+ characters</div>
                <div id="upper">• uppercase</div>
                <div id="num">• number</div>
                <div id="spec">• special character</div>
            </div>
        </div>

        <button id="btn" type="submit">
            <span>Create Account</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </form>
</div>

<!-- OTP MODAL -->
<div class="otp-overlay" id="otpOverlay">
    <div class="otp-card">
        <h3>Verify Email</h3>
        <p style="font-size: 13px; color: var(--subtext); margin-top: 6px;">
            Enter the 6-digit code sent to your email.
        </p>

        <div class="otp-inputs">
            <input maxlength="1" inputmode="numeric" autocomplete="one-time-code">
            <input maxlength="1" inputmode="numeric">
            <input maxlength="1" inputmode="numeric">
            <input maxlength="1" inputmode="numeric">
            <input maxlength="1" inputmode="numeric">
            <input maxlength="1" inputmode="numeric">
        </div>

        <div class="error" id="otpError"></div>

        <button id="otpBtn" type="button" onclick="verifyOTP()">
            <span>Verify</span>
            <div class="spinner" id="otpSpinner"></div>
        </button>

        <p style="font-size: 12px; margin-top: 14px;">
            Resend in <span id="timer">30</span>s
            <span id="resendBtn" class="resend">Resend</span>
        </p>
    </div>
</div>

<script>
const form = document.getElementById("form");
const password = document.getElementById("password");
const btn = document.getElementById("btn");
const spinner = document.getElementById("spinner");
const errorBox = document.getElementById("errorBox");
const card = document.getElementById("card");

const otpOverlay = document.getElementById("otpOverlay");
const inputs = document.querySelectorAll(".otp-inputs input");
const otpSpinner = document.getElementById("otpSpinner");
const otpError = document.getElementById("otpError");
const timer = document.getElementById("timer");
const resendBtn = document.getElementById("resendBtn");

let interval = null;
let time = 30;

// --- DARK MODE ---
function toggleDark() {
    document.body.classList.toggle("dark");
    localStorage.setItem("dark", document.body.classList.contains("dark"));
}
if (localStorage.getItem("dark") === "true") {
    document.body.classList.add("dark");
}

// --- PASSWORD TOGGLE ---
function togglePassword() {
    password.type = password.type === "password" ? "text" : "password";
}

// --- PASSWORD CHECKLIST ---
function toggle(id, ok) {
    document.getElementById(id).classList.toggle("valid", ok);
}
password.addEventListener("input", () => {
    const v = password.value;
    toggle("len", v.length >= 6);
    toggle("upper", /[A-Z]/.test(v));
    toggle("num", /[0-9]/.test(v));
    toggle("spec", /[^A-Za-z0-9]/.test(v));
});

// --- LOADING SPINNERS ---
function setMainLoading(isLoading) {
    spinner.style.display = isLoading ? "inline-block" : "none";
    btn.querySelector("span").innerText = isLoading ? "Creating..." : "Create Account";
    btn.disabled = isLoading;
}
function setOtpLoading(isLoading) {
    otpSpinner.style.display = isLoading ? "inline-block" : "none";
    document.querySelector("#otpBtn span").innerText = isLoading ? "Verifying..." : "Verify";
    document.getElementById("otpBtn").disabled = isLoading;
}

// --- SHOW/HIDE ERROR ---
function showError(el, message) {
    el.innerText = message;
    el.style.display = "block";
}
function hideError(el) {
    el.innerText = "";
    el.style.display = "none";
}

// --- OTP MODAL ---
function openOTP() {
    otpError.style.display = "none";
    otpError.innerText = "";

    inputs.forEach(input => input.value = "");
    otpOverlay.classList.add("show");
    inputs[0].focus();
    startTimer();
}
function closeOTP() {
    otpOverlay.classList.remove("show");
    stopTimer();
}
function stopTimer() {
    if (interval) { clearInterval(interval); interval = null; }
}
function startTimer() {
    stopTimer();
    time = 30;
    timer.innerText = time;

    resendBtn.style.opacity = "0.5";
    resendBtn.style.pointerEvents = "none";

    interval = setInterval(() => {
        time--;
        timer.innerText = time;

        if (time <= 0) {
            stopTimer();
            timer.innerText = "0";
            resendBtn.style.opacity = "1";
            resendBtn.style.pointerEvents = "auto";
        }
    }, 1000);
}
function getOTP() { return [...inputs].map(i => i.value).join(""); }

// --- OTP INPUT BEHAVIOR ---
inputs.forEach((input, i) => {
    input.addEventListener("input", () => {
        input.value = input.value.replace(/\D/g, "").slice(0, 1);
        hideError(otpError);
        if (input.value && i < inputs.length - 1) { inputs[i + 1].focus(); }
    });
    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && i > 0) { inputs[i - 1].focus(); }
    });
    input.addEventListener("paste", (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData("text").replace(/\D/g, "");
        if (!pasted) return;
        [...pasted.slice(0, 6)].forEach((char, idx) => { if (inputs[idx]) inputs[idx].value = char; });
        const nextIndex = Math.min(pasted.length, 5);
        if (inputs[nextIndex]) inputs[nextIndex].focus();
    });
});

// --- PREFILL FORM FROM LOCALSTORAGE ---
document.addEventListener("DOMContentLoaded", () => {
    const savedEmail = localStorage.getItem("signup_email");
    const savedUsername = localStorage.getItem("signup_username");

    if (savedEmail) document.getElementById("email").value = savedEmail;
    if (savedUsername) document.getElementById("username").value = savedUsername;

    const otpRequested = localStorage.getItem("otp_requested");
    if (otpRequested === "true" && savedEmail) {
        openOTP();
    }
});

// --- SAVE FORM INPUTS ON CHANGE ---
document.getElementById("email").addEventListener("input", (e) => { localStorage.setItem("signup_email", e.target.value); });
document.getElementById("username").addEventListener("input", (e) => { localStorage.setItem("signup_username", e.target.value); });

// --- FORM SUBMIT ---
form.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideError(errorBox);
    setMainLoading(true);

    try {
        const fd = new FormData(form);
        const res = await fetch("/signup", { method: "POST", body: fd });
        const data = await res.json();

        if (data.success && data.verify) {
            localStorage.setItem("email", form.email.value);
            localStorage.setItem("otp_requested", "true");
            setMainLoading(false);
            openOTP();
            return;
        }

        if (!data.success) {
            showError(errorBox, data.message || "Signup failed");
            card.classList.add("shake");
            setTimeout(() => card.classList.remove("shake"), 300);
        }
    } catch (err) {
        showError(errorBox, "Network error");
    } finally { setMainLoading(false); }
});

// --- RESEND OTP ---
resendBtn.addEventListener("click", async () => {
    const email = localStorage.getItem("email");
    if (!email) { showError(otpError, "Email not found. Please sign up again."); return; }

    resendBtn.innerText = "Sending...";
    resendBtn.style.pointerEvents = "none";
    resendBtn.style.opacity = "0.5";

    try {
        const res = await fetch("/resend_otp", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (data.success) {
            hideError(otpError);
            resendBtn.innerText = "Resend";
            startTimer();
        } else {
            resendBtn.innerText = "Resend";
            showError(otpError, data.message || "Failed to resend OTP");
            resendBtn.style.pointerEvents = "auto";
            resendBtn.style.opacity = "1";
        }
    } catch (err) {
        resendBtn.innerText = "Resend";
        showError(otpError, "Network error");
        resendBtn.style.pointerEvents = "auto";
        resendBtn.style.opacity = "1";
    }
});

// --- VERIFY OTP ---
async function verifyOTP() {
    const otp = getOTP();
    const email = localStorage.getItem("email");

    hideError(otpError);

    if (otp.length !== 6) {
        showError(otpError, "Please enter the 6-digit code.");
        return;
    }

    if (!email) {
        showError(otpError, "Email not found. Please sign up again.");
        return;
    }

    setOtpLoading(true);

    try {
        const body = new URLSearchParams();
        body.append("email", email);
        body.append("otp", otp);

        const res = await fetch("/verify_otp", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: body.toString()
        });

        const data = await res.json();

        if (data.success) {
            // CLEAR LOCALSTORAGE
            localStorage.removeItem("signup_email");
            localStorage.removeItem("signup_username");
            localStorage.removeItem("email");
            localStorage.removeItem("otp_requested");
            closeOTP();
            window.location.href = "/dashboard";
        } else {
            showError(otpError, data.message || "Invalid OTP");
        }
    } catch (err) {
        showError(otpError, "Network error");
    } finally { setOtpLoading(false); }
}
</script>

</body>
</html>
