<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<style>
:root {
    --bg: #f6f8fc;
    --glass: rgba(255,255,255,0.6);
    --text: #0f172a;
    --subtext: #64748b;
    --border: rgba(0,0,0,0.08);

    --primary: #6366f1;
    --primary2: #8b5cf6;
    --danger: #ef4444;

    --shadow: 0 20px 60px rgba(0,0,0,0.12);
}

.dark {
    --bg: #0a0f1c;
    --glass: rgba(17,24,39,0.6);
    --text: #e6edf3;
    --subtext: #9aa4b2;
    --border: rgba(255,255,255,0.06);

    --primary: #7c83ff;
    --primary2: #a78bfa;
    --danger: #f87171;

    --shadow: 0 25px 70px rgba(0,0,0,0.6);
}

body {
    margin: 0;
    font-family: Inter, system-ui;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    width: 100%;
    max-width: 400px;
    padding: 35px;
    border-radius: 20px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
}

/* INPUT */
.field {
    position: relative;
    margin-bottom: 20px;
}

.field input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
}

.field label {
    position: absolute;
    left: 12px;
    top: 14px;
    color: var(--subtext);
    transition: 0.2s;
    font-size: 13px;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label {
    top: -8px;
    font-size: 11px;
    background: var(--bg);
    padding: 0 5px;
}

/* PASSWORD */
.password-wrap {
    position: relative;
}

.eye {
    position: absolute;
    right: 12px;
    top: 14px;
    cursor: pointer;
    color: var(--subtext);
}

/* BUTTON */
button {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    color: white;
    font-weight: 600;
    background: linear-gradient(135deg, var(--primary), var(--primary2));
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

/* SPINNER */
.spinner {
    width: 16px;
    height: 16px;
    border: 2px solid white;
    border-top: 2px solid transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ERROR */
.error {
    color: var(--danger);
    font-size: 13px;
    margin-bottom: 10px;
    display: none;
}

/* REMEMBER */
.remember {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    margin-bottom: 15px;
}

.remember input { display:none; }

.checkmark {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.checkmark svg {
    width: 12px;
    height: 12px;
    stroke:white;
    stroke-width:3;
    fill:none;
    stroke-dasharray:16;
    stroke-dashoffset:16;
    transition:0.3s;
}

.remember input:checked + .checkmark {
    background: var(--primary);
}

.remember input:checked + .checkmark svg {
    stroke-dashoffset:0;
}

/* LINK */
.link {
    text-align: center;
    margin-top: 15px;
}

a {
    color: var(--primary);
}

/* TOGGLE */
.toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
}

/* SUCCESS OVERLAY */
.success-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
}

.success-overlay.show {
    opacity: 1;
    pointer-events: all;
}

.success-card {
    background: var(--glass);
    border: 1px solid var(--border);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    transform: scale(0.7);
    opacity: 0;
    animation: popIn 0.5s ease forwards;
}

.success-check {
    width: 60px;
    height: 60px;
    margin: auto;
    margin-bottom: 15px;
}

.success-check svg {
    width: 100%;
    height: 100%;
    stroke: #10b981;
    stroke-width: 3;
    fill: none;
    stroke-dasharray: 50;
    stroke-dashoffset: 50;
    animation: drawCheck 0.6s ease forwards 0.2s;
}

@keyframes drawCheck {
    to { stroke-dashoffset: 0; }
}

@keyframes popIn {
    0% { transform: scale(0.7); opacity: 0; }
    60% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleDark()">🌙</div>

<div class="card">
    <h2>Welcome Back</h2>

    <div class="error" id="errorBox"></div>

    <form id="loginForm">
        
        <div class="field">
            <input name="username" placeholder=" " required>
            <label>Username</label>
        </div>

        <div class="field password-wrap">
            <input type="password" id="password" name="password" placeholder=" " required>
            <label>Password</label>
            <span class="eye" onclick="togglePassword()">👁</span>
        </div>

        <label class="remember">
            <input type="checkbox" name="remember">
            <div class="checkmark">
                <svg viewBox="0 0 24 24">
                    <path d="M20 6L9 17L4 12"/>
                </svg>
            </div>
            Remember me
        </label>

        <button id="btn">
            <span>Login</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </form>

    <div class="link">
        Don’t have an account? <a href="/signup">Sign up</a>
    </div>
</div>

<!-- SUCCESS OVERLAY -->
<div class="success-overlay" id="successOverlay">
    <div class="success-card">
        <div class="success-check">
            <svg viewBox="0 0 24 24">
                <path d="M20 6L9 17L4 12"/>
            </svg>
        </div>
        <h3>Login Successful</h3>
    </div>
</div>

<script>
function toggleDark(){
    document.body.classList.toggle("dark");
    localStorage.setItem("dark", document.body.classList.contains("dark"));
}

if(localStorage.getItem("dark")==="true"){
    document.body.classList.add("dark");
}

function togglePassword(){
    let p = document.getElementById("password");
    p.type = p.type === "password" ? "text" : "password";
}

document.getElementById("loginForm").onsubmit = async (e)=>{
    e.preventDefault();

    let btn = document.getElementById("btn");
    let spinner = document.getElementById("spinner");
    let errorBox = document.getElementById("errorBox");

    spinner.style.display = "inline-block";
    btn.querySelector("span").innerText = "Logging in...";
    errorBox.style.display = "none";

    let formData = new FormData(e.target);

    let res = await fetch("/", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    spinner.style.display = "none";

    if(data.success){
        btn.querySelector("span").innerText = "Success ✓";

        let overlay = document.getElementById("successOverlay");
        overlay.classList.add("show");

        setTimeout(()=>{
            window.location.href = "/dashboard";
        }, 1200);
    } else {
        errorBox.innerText = data.message;
        errorBox.style.display = "block";
        btn.querySelector("span").innerText = "Login";
    }
}
</script>

</body>
</html>
